{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}

{% block head_extra %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block body %}
<main class="screen screen--tabbed">

  <div class="topbar">
    <button type="button" class="topbar__back"
            onclick="window.location.href='{{ url_for('dashboard') }}'" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="#26261F" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="page-heading">
    <div class="page-heading__title"><span>{{ page_icon }}</span> {{ page_title }}</div>
    <p class="page-heading__subtitle">{{ page_subtitle }}</p>
  </div>

  <div class="screen__scroll">
    <div class="card empty-state">
      <span class="empty-state__icon-badge"><span class="empty-state__icon">{{ page_icon }}</span></span>
      <p class="empty-state__title">Coming soon</p>
      <p class="empty-state__desc">{{ page_message }}</p>
    </div>
  </div>

  {% include "_bottom_nav.html" %}

</main>
{% endblock %}
